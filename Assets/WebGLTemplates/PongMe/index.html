<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #00cc2a;
    }

    #unity-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unity-canvas {
      /* Fit inside the viewport while preserving the canvas's intrinsic
         aspect ratio. No translate(-50%, -50%) centering — that's what
         clips the top in Unity's default template. */
      max-width: 100%;
      max-height: 100%;
      background: #000;
      display: block;
      outline: none;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #00cc2a;
      font-family: monospace;
      font-size: 18px;
      letter-spacing: 2px;
      pointer-events: none;
    }
    #unity-loading-bar.hidden { display: none; }

    #unity-fullscreen-button {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #00cc2a;
      border-radius: 6px;
      cursor: pointer;
      color: #00cc2a;
      font-size: 20px;
      line-height: 30px;
      text-align: center;
      user-select: none;
    }
    #unity-fullscreen-button:hover {
      background: rgba(0, 51, 10, 0.85);
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
  </div>
  <div id="unity-loading-bar">LOADING PONG ME&hellip;</div>
  <div id="unity-fullscreen-button" title="Toggle Fullscreen">&#x26F6;</div>

  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    var loadingBar = document.querySelector("#unity-loading-bar");
    var canvas = document.querySelector("#unity-canvas");
    var fullscreenBtn = document.querySelector("#unity-fullscreen-button");

    createUnityInstance(canvas, {
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
    }).then(function (unityInstance) {
      loadingBar.classList.add("hidden");
      // Auto-focus the canvas so keyboard input (W/S) works without an extra click.
      canvas.focus();
      fullscreenBtn.addEventListener("click", function () {
        unityInstance.SetFullscreen(1);
      });
    }).catch(function (message) {
      loadingBar.textContent = "Error: " + message;
    });
  </script>
</body>
</html>
